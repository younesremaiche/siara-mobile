paths:
  dataset_path: ../../data/US_Accidents_March23.csv  # TODO: set real path
  artifact_root: ../artifacts
  model_version: siara_v4
  notebook_path: ""
  osm_features_path: /kaggle/working/osm_features.parquet  # required only if use_osm_features=true

runtime:
  seed: 42
  chunksize: 500000
  strict_schema: true
  use_time_features: true
  include_month_feature: false
  timezone: UTC
  use_osm_features: true
  use_geographic_holdout_eval: true
  log_level: INFO

label:
  target_col: Severity
  severe_threshold: 3
  allowed_severity_values: [1, 2, 3, 4]
  time_col: Start_Time

sampling:
  time_cutoff_quantile: 0.90
  time_samples_per_chunk: 20000
  train_rows: 1500000
  val_rows: 500000
  geo_eval_rows: 200000
  test_size: 0.20
  calib_fraction_of_rest: 0.60

features:
  numeric_base:
    - Temperature(F)
    - Humidity(%)
    - Pressure(in)
    - Visibility(mi)
    - Wind_Speed(mph)
    - Precipitation(in)
  categorical_base:
    - Wind_Direction
    - Weather_Condition
    - Sunrise_Sunset
    - Civil_Twilight
    - Nautical_Twilight
    - Astronomical_Twilight
  boolean_base:
    - Amenity
    - Bump
    - Crossing
    - Give_Way
    - Junction
    - No_Exit
    - Railway
    - Roundabout
    - Station
    - Stop
    - Traffic_Calming
    - Traffic_Signal
    - Turning_Loop
  osm_numeric:
    - road_class_count
    - intersection_density
    - roundabout_density
    - maxspeed_mean_kmh
    - maxspeed_p90_kmh
  osm_categorical:
    - dominant_road_class
  geo_lat_col: Start_Lat
  geo_lng_col: Start_Lng
  geo_state_col: State
  top_k_categories:
    Weather_Condition: 120
    Wind_Direction: 32
  category_other_token: __OTHER__
  category_missing_token: __MISSING__
  osm_cell_decimals: 3

model:
  type: lightgbm
  params:
    objective: binary
    metric: auc
    n_estimators: 12000
    learning_rate: 0.03
    num_leaves: 96
    subsample: 0.8
    colsample_bytree: 0.8
    reg_lambda: 1.0
    min_child_samples: 40
    max_bin: 255
    n_jobs: -1
  early_stopping_rounds: 300
  eval_log_period: 200

calibration:
  method: sigmoid
  threshold_quantiles: [0.50, 0.75, 0.90]
  threshold_source: train
  validated_on_target_domain: false
  threshold_source: calib

evaluation:
  top_k_fracs: [0.05, 0.10]
  calibration_bins: 10
  stability_freq: Q
  plot: true
  holdout_states: [CA, TX, FL]

deployment:
  source_domain: US
  target_domain: Algeria
  algeria_mode_default: relative_risk
